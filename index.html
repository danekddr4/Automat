<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automat na nápoje</title>
</head>
<body>
    <h2>Vyber si nápoj</h2>
    <button onclick="sendRequest(1)">Nápoj 1</button><br>
    <button onclick="sendRequest(2)">Nápoj 2</button><br>
    <button onclick="sendRequest(3)">Nápoj 3</button><br>
    <button onclick="sendRequest(4)">Nápoj 4</button><br>

    <script>
        function sendRequest(num) {
            fetch(`http://192.168.0.141/relay?num=${num}`)
                .then(response => response.text())
                .then(data => console.log(data))
                .catch(error => console.error("Chyba při odesílání požadavku: ", error));
        }
    </script>
</body>
</html>
