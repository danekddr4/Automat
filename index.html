<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automat na nápoje</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f5f5f5; }
        .button { display: inline-block; padding: 20px 40px; font-size: 20px; border: none; cursor: pointer; margin: 10px; border-radius: 10px; }
        .cocacola { background-color: red; color: black; }
        .icetea { background-color: green; color: white; }
        .mirinda { background-color: orange; color: yellow; }
        .sprite { background-color: white; color: green; border: 2px solid green; }
    </style>
    <script>
        function orderDrink(drink) {
            fetch("http://192.168.0.141/drink?name=" + drink)
                .then(response => response.text())
                .then(data => alert(data))
                .catch(error => alert("Chyba při odesílání požadavku: " + error));
        }
    </script>
</head>
<body>
    <h1>Automat na nápoje</h1>
    <p>Zvolte nápoj:</p>
    <button class="button cocacola" onclick="orderDrink('cocacola')">Coca-Cola</button>
    <button class="button icetea" onclick="orderDrink('icetea')">Ice Tea</button>
    <button class="button mirinda" onclick="orderDrink('mirinda')">Mirinda</button>
    <button class="button sprite" onclick="orderDrink('sprite')">Sprite</button>
</body>
</html>
