<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automat na nápoje</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
        }
        .container {
            margin-top: 50px;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            margin: 10px;
            width: 180px;
            height: 80px;
            text-align: center;
            font-weight: bold;
        }
        .coca-cola { background-color: red; color: black; }
        .icetea { background-color: green; color: white; }
        .sprite { background-color: white; color: green; border: 2px solid green; }
        .mirinda { background-color: orange; color: yellow; }
    </style>
</head>
<body>
    <h1>Automat na nápoje</h1>
    <p>Zvolte nápoj:</p>
    <div class="container">
        <button class="button coca-cola" onclick="orderDrink('cocacola')">Coca-Cola</button>
        <button class="button icetea" onclick="orderDrink('icetea')">Ice Tea</button>
        <button class="button sprite" onclick="orderDrink('sprite')">Sprite</button>
        <button class="button mirinda" onclick="orderDrink('mirinda')">Mirinda</button>
    </div>

    <script>
        function orderDrink(drinkName) {
            fetch("http://192.168.0.141/drink?name=" + drinkName)
            .then(response => response.text())
            .then(data => console.log("Odpověď serveru: " + data))
            .catch(error => console.error("Chyba:", error));
        }
    </script>
</body>
</html>
