<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovládání automatu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .button {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .button:hover {
            opacity: 0.8;
        }
        .cola { background-color: #d32f2f; }
        .icetea { background-color: #388e3c; }
        .mirinda { background-color: #ff9800; }
        .sprite { background-color: #1976d2; }
    </style>
</head>
<body>
    <h1>Ovládání automatu</h1>
    <div class="button-container">
        <button class="button cola" onclick="sendRequest('cola')">Coca-Cola</button>
        <button class="button icetea" onclick="sendRequest('icetea')">Ice Tea</button>
        <button class="button mirinda" onclick="sendRequest('mirinda')">Mirinda</button>
        <button class="button sprite" onclick="sendRequest('sprite')">Sprite</button>
    </div>

    <script>
        function sendRequest(drink) {
            fetch("https://automat-7b66a-default-rtdb.europe-west1.firebasedatabase.app/.json", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ drink: drink, status: "ready", time: "10s" })
            }).then(response => console.log("Odesláno:", drink))
            .catch(error => console.error("Chyba:", error));
        }
    </script>
</body>
</html>
