<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automat na nápoje</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .button {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            width: 160px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Coca-Cola */
        .coca-cola {
            background-color: red;
            color: black;
        }
        /* Ice Tea */
        .ice-tea {
            background-color: green;
            color: white;
        }
        /* Sprite */
        .sprite {
            background-color: white;
            color: green;
            border: 3px solid green;
        }
        /* Mirinda */
        .mirinda {
            background-color: orange;
            color: yellow;
            border: 3px solid yellow;
        }
    </style>
</head>
<body>

    <h1>Automat na nápoje</h1>
    <p>Zvolte nápoj:</p>

    <div class="container">
        <button class="button coca-cola">Coca-Cola</button>
        <button class="button ice-tea">Ice Tea</button>
        <button class="button sprite">Sprite</button>
        <button class="button mirinda">Mirinda</button>
    </div>

</body>
</html>
