<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ovládání automatu</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .button {
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            width: 200px;
        }
        .cola { background-color: red; }
        .icetea { background-color: green; }
    </style>
</head>
<body>
    <h1>Ovládání automatu</h1>
    <button class="button cola" onclick="startDrink('cola')">Coca-Cola</button>
    <button class="button icetea" onclick="startDrink('icetea')">Ice Tea</button>

    <script>
        const firebaseConfig = {
            apiKey: "TVŮJ_API_KEY",
            authDomain: "TVŮJ_AUTH_DOMAIN",
            databaseURL: "TVŮJ_DATABASE_URL",
            projectId: "TVŮJ_PROJECT_ID",
            storageBucket: "TVŮJ_STORAGE_BUCKET",
            messagingSenderId: "TVŮJ_MESSAGING_SENDER_ID",
            appId: "TVŮJ_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startDrink(drink) {
            db.ref("/").update({
                "drink": drink,
                "status": "pouring"
            });
            alert(drink.charAt(0).toUpperCase() + drink.slice(1) + " se připravuje!");
        }
    </script>
</body>
</html>
